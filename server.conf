server {
	listen 127.0.0.1:8888;
	server_name http://site_one.com;
	client_max_body_size 1M;
	error_page 404 405 412 /4xx.html;
	location / {
		root /websites/site_one;
		index index.html;
		autoindex on;
		limit_except GET POST DELETE {
			deny all;
		}
	}
	location /upload {
		root /websites/site_one;
		file_uploads yes;
		upload_store /websites/site_one/uploads;
		limit_except POST DELETE {
			deny all;
		}
	}
	location /images {
		root /websites/site_one;
		limit_except GET {
			deny all;
		}
	}
	location /redir {
		return 301 http://site_two.com;
	}
}
