server {
	listen 127.0.0.1:8888;
	server_name http://catsanddogs.com;
	client_max_body_size 1M;
	error_page 404 405 412 /4xx.html;
	location / {
		root /var/www/html;
		index index.html;
		autoindex on;
		limit_except GET POST DELETE {
			deny all;
		}
		file_uploads yes;
		upload_store /uploaded/files/here/lol;
	}
	location .php {
		root /cgi-bin;
		cgi_param SCRIPT_FILENAME
		cgi_param QUERY_STRING
		cgi_param REQUEST_METHOD
		cgi_param CONTENT_TYPE
		cgi_param CONTENT_LENGTH
		cgi_param PATH_INFO
	}
}
