server {
	listen 127.0.0.1:8888;
	server_name http://catsanddogs.com;
	client_max_body_size 1M;
	error_page 404 405 412 /4xx.html;
	location /main-route-uri {
		root /var/www/html;
		index index.html;
		autoindex on;
		limit_except GET POST DELETE {
			deny all;
		}
	}
	location /upload-to-server {
		file_uploads yes;
		upload_store /var/www/uploads/lolfolder;
		limit_except POST DELETE {
			deny all;
		}
	}
	location /requested/path-uri {
		alias /actual/given/path;
		limit_except GET {
			deny all;
		}
	}
}

server {
	listen 127.0.0.2:8888;
}
